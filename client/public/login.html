<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login • Physion</title>
    <link rel="stylesheet" href="/css/output.css" />
  </head>
  <body class="min-h-screen p-6 flex items-center justify-center bg-white text-zinc-900 font-mono antialiased dark:bg-zinc-950 dark:text-zinc-100">
    <main class="w-full max-w-md">
      <header class="mb-4 bg-white dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 border-l-2 border-l-violet-500 dark:border-l-violet-400 rounded-sm p-4 flex items-center justify-between gap-3">
        <div>
          <h1 class="text-sm font-medium text-zinc-800 dark:text-zinc-200">Physion Login</h1>
          <p class="mt-1 text-[11px] uppercase tracking-widest text-zinc-400 dark:text-zinc-500">Secure clinic access</p>
        </div>
        <button id="loginThemeToggle" class="bg-transparent border border-zinc-300 dark:border-zinc-700 text-zinc-900 dark:text-zinc-100 font-mono font-normal text-sm rounded-sm px-4 py-2 hover:bg-zinc-900 hover:text-zinc-100 hover:border-zinc-900 dark:hover:bg-zinc-100 dark:hover:text-zinc-900 dark:hover:border-zinc-100 active:scale-[0.97] transition-all duration-100" aria-label="Toggle dark mode">🌙</button>
      </header>

      <div class="w-full bg-white dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 border-l-2 border-l-emerald-500 dark:border-l-emerald-400 rounded-sm p-4">
        <h2 class="text-sm font-medium text-zinc-800 dark:text-zinc-200 mb-4">Staff Login</h2>
        <form id="loginForm" class="space-y-4">
          <div>
            <label class="block text-[11px] uppercase tracking-widest font-mono font-normal text-zinc-400 dark:text-zinc-500 mb-1" for="email">Email</label>
            <input id="email" class="w-full bg-transparent border border-zinc-300 dark:border-zinc-700 rounded-sm px-3 py-2 text-sm font-mono font-normal text-zinc-900 dark:text-zinc-100 placeholder:text-zinc-400 dark:placeholder:text-zinc-600 focus:outline-none focus:ring-1 focus:ring-zinc-900 dark:focus:ring-zinc-100 transition-colors duration-100" type="email" required aria-label="Email" />
          </div>
          <div>
            <label class="block text-[11px] uppercase tracking-widest font-mono font-normal text-zinc-400 dark:text-zinc-500 mb-1" for="password">Password</label>
            <input id="password" class="w-full bg-transparent border border-zinc-300 dark:border-zinc-700 rounded-sm px-3 py-2 text-sm font-mono font-normal text-zinc-900 dark:text-zinc-100 placeholder:text-zinc-400 dark:placeholder:text-zinc-600 focus:outline-none focus:ring-1 focus:ring-zinc-900 dark:focus:ring-zinc-100 transition-colors duration-100" type="password" required aria-label="Password" />
          </div>
          <button class="w-full bg-transparent border border-zinc-300 dark:border-zinc-700 text-zinc-900 dark:text-zinc-100 font-mono font-normal text-sm rounded-sm px-4 py-2 hover:bg-zinc-900 hover:text-zinc-100 hover:border-zinc-900 dark:hover:bg-zinc-100 dark:hover:text-zinc-900 dark:hover:border-zinc-100 active:scale-[0.97] transition-all duration-100" type="submit" aria-label="Login">Login</button>
        </form>
        <p id="error" class="text-sm font-mono font-normal text-rose-600 dark:text-rose-400 mt-3"></p>
      </div>

      <footer class="mt-4 text-center bg-white dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 border-l-2 border-l-fuchsia-500 dark:border-l-fuchsia-400 rounded-sm p-4 text-[11px] uppercase tracking-widest text-zinc-400 dark:text-zinc-500">
        <span id="loginFooterYear"></span>
      </footer>
    </main>

    <script>
      document.getElementById('loginFooterYear').textContent = `© ${new Date().getFullYear()} Physion`;
    </script>

    <script type="module" src="/js/auth.js"></script>
  </body>
</html>
